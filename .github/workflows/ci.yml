# CI for ez-ffmpeg.
#
# FFmpeg 7.x is provided by BUILDING IT FROM SOURCE inside CI, not from apt.
# `ffmpeg-sys-next 7.1` links against the FFmpeg 7.x ABI (libavcodec 61.x), but
# `ubuntu-latest` (24.04) only ships FFmpeg 6.1 (libavcodec 60.x) via apt, which
# does not link. Enabling the crate's `ffmpeg-sys-next/build` feature makes its
# build script `git clone` the `release/7.1` branch of FFmpeg and compile it, so
# the linked ABI matches the bindings exactly on any runner. The apt packages
# below are just the toolchain that compile needs (nasm/yasm/clang/pkg-config/
# zlib), NOT FFmpeg itself. The first build compiles FFmpeg (~10-20 min); the
# cache makes subsequent runs fast.
#
# GPU-dependent code: the `opengl`/`wgpu` frame filters need a real GPU/display
# and their tests fail headless ("Failed to create Surfman connection"). The
# `build` job still compiles them (via `--all-features`) so they stay type-checked;
# the `test` job omits those two features so the suite runs green on a GPU-less
# runner (everything else — 465 tests — passes). The macOS-only `videotoolbox`
# scheduler tests are `#[cfg(target_os = "macos")]`, so they do not run on Linux.
#
# `build` + `clippy` + `test` are all enforced gates.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Trigger the from-source FFmpeg 7.1 build in ffmpeg-sys-next.
  FFMPEG_FEATURES: --features ffmpeg-sys-next/build

jobs:
  build:
    name: Build & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm yasm clang pkg-config make git zlib1g-dev
          echo "nasm: $(nasm --version | head -1)"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-buildffmpeg-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --all-features $FFMPEG_FEATURES --verbose

      # Safety-hygiene lints surface here. Not `-D warnings` yet: the crate has a
      # pre-existing unused-import / undocumented-unsafe backlog to clear first.
      - name: Clippy
        run: cargo clippy --all-features $FFMPEG_FEATURES --lib

  test:
    name: Test
    runs-on: ubuntu-latest
    # Runs the full library suite MINUS the opengl/wgpu features, whose tests
    # need a GPU/display. Everything else passes headless. Media assets are
    # committed as test.mp4.
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm yasm clang pkg-config make git zlib1g-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-buildffmpeg-${{ hashFiles('**/Cargo.lock') }}

      - name: Test
        run: cargo test --lib --features async,rtmp,flv,subtitle $FFMPEG_FEATURES
