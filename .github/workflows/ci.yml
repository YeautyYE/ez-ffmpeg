# CI scaffolding for ez-ffmpeg.
#
# NOT yet verified on GitHub Actions. Two known constraints must be resolved by
# whoever first enables this workflow:
#
#   1. FFmpeg 7.x: `ffmpeg-sys-next 7.1` links against the FFmpeg 7.x ABI.
#      `ubuntu-24.04` (current `ubuntu-latest`) ships FFmpeg 6.1 via apt, which
#      will NOT link. Provide 7.x through a newer runner image, a PPA/
#      deb-multimedia source, or a vendored `ffmpeg-sys-next` build before the
#      `build` job can go green.
#   2. GPU-dependent tests: with `--all-features`, the `opengl`/`wgpu` frame-filter
#      tests need a real GPU/display (they fail headless with "Failed to create
#      Surfman connection: ConnectionFailed"), so `test` stays non-blocking until
#      those are gated or the runner has a GPU. (The macOS-only `videotoolbox`
#      scheduler tests are now `#[cfg(target_os = "macos")]`, so they no longer
#      false-fail on Linux. An earlier note here claimed a "pre-existing
#      packet_scanner segfault" — that was a `--all-features` / `docs-rs` artifact,
#      now fixed: `docsrs` is a `build.rs` cfg rather than a Cargo feature, so
#      `--all-features` links real FFmpeg instead of the crashing stub.)
#
# `build` + `clippy` are the enforced safety gates once FFmpeg 7.x is available.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg 7.x development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavfilter-dev libavdevice-dev \
            libavutil-dev libswscale-dev libswresample-dev libpostproc-dev \
            pkg-config clang
          echo "linked libavcodec: $(pkg-config --modversion libavcodec)"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --all-features --verbose

      # Safety-hygiene lints surface here. Not `-D warnings` yet: the crate has a
      # pre-existing unused-import / undocumented-unsafe backlog to clear first.
      - name: Clippy
        run: cargo clippy --all-features --lib

  test:
    name: Test (non-blocking)
    runs-on: ubuntu-latest
    # Non-blocking: with --all-features the opengl/wgpu frame-filter tests need a
    # GPU/display and fail headless. Promote to a required gate once those are
    # gated (or the runner has a GPU). The macOS-only videotoolbox tests are
    # already #[cfg(target_os = "macos")]. Media assets are committed as test.mp4.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg 7.x development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavfilter-dev libavdevice-dev \
            libavutil-dev libswscale-dev libswresample-dev libpostproc-dev \
            pkg-config clang

      - uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --all-features --lib
