# CI for ez-ffmpeg.
#
# FFmpeg 7.x is provided by BUILDING IT FROM SOURCE inside CI, not from apt.
# `ffmpeg-sys-next 7.1` links against the FFmpeg 7.x ABI (libavcodec 61.x), but
# `ubuntu-latest` (24.04) only ships FFmpeg 6.1 (libavcodec 60.x) via apt, which
# does not link. Enabling the crate's `ffmpeg-sys-next/build` feature makes its
# build script `git clone` the `release/7.1` branch of FFmpeg and compile it, so
# the linked ABI matches the bindings exactly on any runner. The apt packages
# below are just the toolchain that compile needs (nasm/yasm/clang/pkg-config/
# zlib), NOT FFmpeg itself. The first build compiles FFmpeg (~10-20 min); the
# cache makes subsequent runs fast.
#
# GPU-dependent tests: with `--all-features` the `opengl`/`wgpu` frame-filter
# tests need a real GPU/display (they fail headless with "Failed to create
# Surfman connection: ConnectionFailed"), so `test` stays non-blocking until
# those are gated or the runner has a GPU. The macOS-only `videotoolbox`
# scheduler tests are `#[cfg(target_os = "macos")]`, so they do not false-fail on
# Linux.
#
# `build` + `clippy` are the enforced safety gates.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Trigger the from-source FFmpeg 7.1 build in ffmpeg-sys-next.
  FFMPEG_FEATURES: --features ffmpeg-sys-next/build

jobs:
  build:
    name: Build & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm yasm clang pkg-config make git zlib1g-dev
          echo "nasm: $(nasm --version | head -1)"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-buildffmpeg-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --all-features $FFMPEG_FEATURES --verbose

      # Safety-hygiene lints surface here. Not `-D warnings` yet: the crate has a
      # pre-existing unused-import / undocumented-unsafe backlog to clear first.
      - name: Clippy
        run: cargo clippy --all-features $FFMPEG_FEATURES --lib

  test:
    name: Test (non-blocking)
    runs-on: ubuntu-latest
    # Non-blocking: with --all-features the opengl/wgpu frame-filter tests need a
    # GPU/display and fail headless. Promote to a required gate once those are
    # gated (or the runner has a GPU). The macOS-only videotoolbox tests are
    # already #[cfg(target_os = "macos")]. Media assets are committed as test.mp4.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm yasm clang pkg-config make git zlib1g-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-buildffmpeg-${{ hashFiles('**/Cargo.lock') }}

      - name: Test
        run: cargo test --all-features $FFMPEG_FEATURES --lib
